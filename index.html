<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForgeFit AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 90%;
  max-width: 420px;
  text-align: center;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

h1 {
  letter-spacing: 3px;
  margin-bottom: 10px;
}

.quote {
  font-size: 13px;
  opacity: 0.6;
  margin-bottom: 20px;
  font-style: italic;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  text-align: center;
  margin-bottom: 15px;
  outline: none;
}

.tiles {
  display: grid;
  gap: 10px;
  margin-bottom: 15px;
}

.tile {
  padding: 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  transition: 0.2s;
}

.tile:hover {
  transform: scale(1.03);
  background: rgba(255,255,255,0.1);
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:active {
  transform: scale(0.98);
}

#output {
  margin-top: 20px;
  white-space: pre-line;
  opacity: 0.9;
}

.loading {
  margin-top: 15px;
  opacity: 0.6;
  font-size: 13px;
}

</style>
</head>

<body>

<div class="container">

  <h1>FORGEFIT AI</h1>

  <div class="quote">
    "Nikt we mnie nie wierzy — więc zrobię to bez nich."
  </div>

  <input id="goal" placeholder="Wpisz cel lub kliknij niżej">

  <div class="tiles">
    <div class="tile" onclick="setGoal('masa')">💪 Masa</div>
    <div class="tile" onclick="setGoal('siła')">⚡ Siła</div>
    <div class="tile" onclick="setGoal('redukcja')">🔥 Redukcja</div>
  </div>

  <button onclick="generate()">Generuj plan</button>

  <div class="loading" id="loading"></div>
  <div id="output"></div>

</div>

<script>

function setGoal(value) {
  document.getElementById("goal").value = value;
}

async function generate() {
  const goal = document.getElementById("goal").value;

  if (!goal) {
    document.getElementById("output").innerText = "Wpisz cel lub kliknij opcję 👆";
    return;
  }

  document.getElementById("loading").innerText = "AI myśli... 🧠";
  document.getElementById("output").innerText = "";

  try {
    const res = await fetch("/.netlify/functions/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ goal })
    });

    const data = await res.json();

    document.getElementById("output").innerText = data.plan;
  } catch (e) {
    document.getElementById("output").innerText = "Błąd połączenia z AI ❌";
  }

  document.getElementById("loading").innerText = "";
}

</script>

</body>
</html>
